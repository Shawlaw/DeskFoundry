name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test updater workspace
        run: cargo test --workspace

      - name: Check desktop app template
        run: cargo check --manifest-path templates/desktop-app-template/Cargo.toml --bins
